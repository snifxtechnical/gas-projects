<style>
  /* ══════════════════════════════════════════════════
     DESIGN SYSTEM v2.2 — "Tumbuh" Financial App
     Palette: Forest Green #076653 | Electric Lime #E3EF26 | Soft Cream #E2FBCE
  ══════════════════════════════════════════════════ */
  :root {
    --primary   : #076653;
    --primary-dk : #043d32;
    --accent    : #E3EF26;
    --soft      : #E2FBCE;
    --soft-2    : #c8f5a0;
    --bg        : #F7FDF4;
    --card      : #ffffff;
    --text      : #043d32;
    --text-muted: #5a8a7a;
    --border    : #d4eedd;
    --nav-h     : 76px;
  }

  * { -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', 'Outfit', system-ui, sans-serif;
    color: var(--text);
    padding-bottom: calc(var(--nav-h) + 16px);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ──────────────────────────────────────── */
  .app-header {
    background: var(--primary);
    position: sticky;
    top: 0;
    z-index: 40;
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(4,61,50,0.18);
  }
  .app-header h1 {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .header-badge {
    background: rgba(227,239,38,0.18);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  /* ── BOTTOM NAVIGATION ───────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    height: var(--nav-h);
    background: var(--primary);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 50;
    box-shadow: 0 8px 32px rgba(4,61,50,0.28), 0 2px 8px rgba(4,61,50,0.12);
    padding: 0 8px;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 12px;
    border-radius: 16px;
    color: rgba(226,251,206,0.55);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.2s ease;
    cursor: pointer;
    min-width: 56px;
  }
  .nav-btn svg { width: 22px; height: 22px; transition: transform 0.2s; }
  .nav-btn.active {
    color: var(--accent);
    background: rgba(227,239,38,0.12);
  }
  .nav-btn.active svg { transform: scale(1.1); }
  .nav-btn:active { transform: scale(0.93); }

  /* FAB — Floating Action Button */
  .fab {
    width: 56px;
    height: 56px;
    background: var(--accent);
    color: var(--primary-dk);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -20px;
    box-shadow: 0 6px 20px rgba(227,239,38,0.5);
    border: 3px solid var(--primary);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    flex-shrink: 0;
  }
  .fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(227,239,38,0.3); }
  .fab svg { width: 26px; height: 26px; stroke-width: 2.8; }

  /* ── TAB KONTEN ──────────────────────────────────── */
  .tab-content { animation: fadeUp 0.22s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LAINNYA DRAWER ──────────────────────────────── */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(4,61,50,0.45);
    backdrop-filter: blur(4px);
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-radius: 28px 28px 0 0;
    z-index: 61;
    padding: 0 16px 32px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    max-height: 60vh;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 14px auto 20px;
  }
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.15s;
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
  }
  .drawer-item:hover, .drawer-item:active { background: var(--soft); }
  .drawer-item-icon {
    width: 44px; height: 44px;
    background: var(--soft);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  /* ── MODAL (BOTTOM SHEET) ────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(4,61,50,0.4);
    backdrop-filter: blur(4px);
    z-index: 70;
    display: none;
    align-items: flex-end;
  }
  #modal-overlay.flex { display: flex; }
  .modal-sheet {
    background: var(--card);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    padding-bottom: env(safe-area-inset-bottom);
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0.6; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-drag {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 14px auto 0;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 2;
    border-radius: 28px 28px 0 0;
  }
  .modal-header h3 {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }
  .modal-close {
    width: 32px; height: 32px;
    background: var(--soft);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary);
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
  }
  #modal-body { padding: 16px 20px; }
  .modal-footer {
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    position: sticky;
    bottom: 0;
    background: var(--card);
  }

  /* ── HERO BALANCE CARD ───────────────────────────── */
  .hero-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
    border-radius: 28px;
    padding: 24px 20px 20px;
    color: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(4,61,50,0.22);
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(227,239,38,0.08);
    border-radius: 50%;
  }
  .hero-card::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 200px; height: 200px;
    background: rgba(226,251,206,0.05);
    border-radius: 50%;
  }
  .hero-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(226,251,206,0.65);
    margin-bottom: 4px;
  }
  .hero-amount {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .hero-mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }
  .hero-mini-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .hero-mini-label {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
  }
  .hero-mini-val { font-size: 15px; font-weight: 800; }
  .hero-mini-val.income { color: var(--accent); }
  .hero-mini-val.expense { color: #fca5a5; }

  /* ── STAT CARDS ──────────────────────────────────── */
  .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(4,61,50,0.07);
    border: 1px solid var(--border);
  }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  /* ── SECTION CARD ────────────────────────────────── */
  .section-card {
    background: var(--card);
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(4,61,50,0.07);
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* ── SANKEY CONTAINER ────────────────────────────── */
  #sankey-chart-container {
    width: 100%;
    height: 240px;
    overflow: hidden;
    border-radius: 12px;
  }

  /* ── TRANSACTION CARDS ───────────────────────────── */
  .trx-card {
    background: var(--card);
    border-radius: 16px;
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
    transition: box-shadow 0.15s;
  }
  .trx-card:active { box-shadow: 0 4px 16px rgba(4,61,50,0.1); }
  .trx-icon {
    width: 40px; height: 40px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .trx-icon.income  { background: #dcfce7; color: #15803d; }
  .trx-icon.expense { background: #fee2e2; color: #dc2626; }
  .trx-icon.transfer { background: var(--soft); color: var(--primary); }

  /* ── MASTER ITEMS ────────────────────────────────── */
  .master-item {
    background: var(--card);
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border: 1px solid var(--border);
  }

  /* ── ARISAN CARD ─────────────────────────────────── */
  .arisan-card {
    background: var(--card);
    border-radius: 20px;
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(4,61,50,0.07);
  }

  /* ── SALDO ROW ───────────────────────────────────── */
  .saldo-row {
    background: var(--card);
    border-radius: 16px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .saldo-row .saldo-akhir-positive { color: #15803d; font-weight: 800; }
  .saldo-row .saldo-akhir-negative { color: #dc2626; font-weight: 800; }

  /* ── BADGE ───────────────────────────────────────── */
  .badge {
    display: inline-block;
    font-size: 9.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-green   { background: #dcfce7; color: #15803d; }
  .badge-red     { background: #fee2e2; color: #b91c1c; }
  .badge-blue    { background: #dbeafe; color: #1d4ed8; }
  .badge-amber   { background: #fef3c7; color: #b45309; }
  .badge-gray    { background: #f3f4f6; color: #6b7280; }
  .badge-violet  { background: #ede9fe; color: #6d28d9; }
  .badge-teal    { background: #ccfbf1; color: #0f766e; }
  .badge-lime    { background: var(--soft); color: var(--primary); }
  .badge-orange  { background: #ffedd5; color: #c2410c; }

  /* ── FORM CONTROLS ───────────────────────────────── */
  .form-label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-control {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
    font-weight: 500;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(7,102,83,0.12);
  }
  .form-control.is-invalid {
    border-color: #ef4444;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
  }

  /* Tipe Switcher (Transfer/Masuk/Keluar) */
  .tipe-switcher {
    display: flex;
    background: var(--soft);
    border-radius: 14px;
    padding: 4px;
    gap: 3px;
  }
  .tipe-btn {
    flex: 1;
    padding: 9px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tipe-btn.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 8px rgba(7,102,83,0.2);
  }

  /* ── BUTTONS ─────────────────────────────────────── */
  .btn-primary {
    background: var(--primary);
    color: white;
    border-radius: 14px;
    padding: 13px 20px;
    font-weight: 800;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    width: 100%;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
  .btn-secondary {
    background: var(--soft);
    color: var(--primary);
    border-radius: 14px;
    padding: 13px 20px;
    font-weight: 700;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    width: 100%;
  }
  .btn-accent {
    background: var(--accent);
    color: var(--primary-dk);
    border-radius: 14px;
    padding: 11px 16px;
    font-weight: 800;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    border: none;
  }
  .btn-accent:active { transform: scale(0.96); }

  /* Sub-tab switchers */
  .sub-tab-wrap {
    display: flex;
    background: var(--soft);
    border-radius: 14px;
    padding: 4px;
    gap: 3px;
  }
  .sub-tab-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 10px;
    font-size: 11.5px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .sub-tab-btn.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 6px rgba(7,102,83,0.15);
  }
  /* backward-compat aliases */
  .budget-tab-btn { @extend .sub-tab-btn; }
  .master-tab-btn { @extend .sub-tab-btn; }

  /* ── LOADING SPINNER ─────────────────────────────── */
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--soft-2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ───────────────────────────────────────── */
  #toast {
    transition: opacity 0.25s, transform 0.25s;
    font-weight: 700;
  }
  #toast.toast-success { background: #064e3b; }
  #toast.toast-error   { background: #7f1d1d; }
  #toast.toast-info    { background: var(--primary-dk); }

  /* ── PROGRESS BAR ────────────────────────────────── */
  .progress-bar {
    width: 100%; background: var(--soft);
    border-radius: 99px; height: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── DELETE BUTTON ───────────────────────────────── */
  .btn-delete {
    color: #d1d5db;
    font-size: 13px;
    padding: 3px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.1s, background 0.1s;
  }
  .btn-delete:hover { color: #dc2626; background: #fee2e2; }

  /* ── SCROLLBAR HIDE ──────────────────────────────── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* ── INFO BOX ────────────────────────────────────── */
  .info-box {
    background: var(--soft);
    border: 1px solid var(--soft-2);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--primary);
    font-weight: 500;
    line-height: 1.5;
  }
  .info-box strong { font-weight: 800; }

  /* ── UTILITY ─────────────────────────────────────── */
  .text-primary { color: var(--primary); }
  .text-muted   { color: var(--text-muted); }
  .bg-soft      { background: var(--soft); }
  .divider      { height: 1px; background: var(--border); margin: 8px 0; }

  /* ══════════════════════════════════════════════════
     v1.1 — CC / PAYLATER / CICILAN STYLES
  ══════════════════════════════════════════════════ */

  /* Kartu utang (merah muda) */
  .utang-card {
    background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
    border-radius: 20px;
    padding: 16px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .utang-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  /* DSR Bar */
  .dsr-bar-wrap { width: 100%; background: rgba(255,255,255,0.15); border-radius: 99px; height: 10px; overflow: hidden; }
  .dsr-bar-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
  .dsr-bar-fill.dsr-aman    { background: #86efac; }
  .dsr-bar-fill.dsr-warning { background: #fde68a; }
  .dsr-bar-fill.dsr-danger  { background: #fca5a5; animation: dsrPulse 1.5s ease-in-out infinite; }
  @keyframes dsrPulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.65; }
  }

  /* Bill Reminder Banner */
  .reminder-banner {
    background: #fff7ed;
    border: 1.5px solid #fed7aa;
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .reminder-banner .reminder-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .reminder-banner-danger {
    background: #fff1f2;
    border-color: #fecdd3;
  }

  /* Cicilan Card */
  .cicilan-card {
    background: var(--card);
    border-radius: 18px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 4px rgba(4,61,50,0.06);
  }
  .cicilan-card.cicilan-lunas {
    opacity: 0.55;
    border-style: dashed;
  }

  /* Cicilan progress bar */
  .cicilan-progress-wrap { width: 100%; background: var(--soft); border-radius: 99px; height: 7px; overflow: hidden; margin: 8px 0 4px; }
  .cicilan-progress-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .cicilan-progress-fill.progress-done { background: #86efac; }

  /* Limit Bar (sisa limit CC) */
  .limit-bar-wrap { width: 100%; background: #fee2e2; border-radius: 99px; height: 6px; overflow: hidden; margin-top: 6px; }
  .limit-bar-fill { height: 100%; border-radius: 99px; background: #f87171; transition: width 0.6s ease; }
  .limit-bar-fill.limit-safe { background: var(--primary); }

  /* Cicilan toggle (di form transaksi) */
  .cicilan-toggle-wrap {
    background: #fff7ed;
    border: 1.5px solid #fed7aa;
    border-radius: 14px;
    padding: 12px 14px;
  }
  .cicilan-toggle-wrap.active {
    background: var(--soft);
    border-color: var(--primary);
  }

  /* Badge CC / Paylater */
